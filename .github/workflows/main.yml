  build_ios_xcode:
    name: Build iOS Xcode Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('**/Packages/manifest.json') }}
          restore-keys: |
            Library-iOS-
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: iOS
          versioning: None
      - uses: actions/upload-artifact@v4
        with:
          name: iOS-xcode
          path: build/iOS

  build_ios_ipa:
    name: Create Unsigned IPA
    runs-on: macos-latest
    needs: build_ios_xcode
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          name: iOS-xcode
          path: ios-project
  
      - name: List downloaded iOS Xcode project files
        run: |
          ls -R ios-project
  
      - name: Create ExportOptions.plist dynamically
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
          </dict>
          </plist>
          EOF
  
      # Adjust this path depending on where the xcodeproj actually is
      - name: Archive Xcode Project
        run: |
          cd ios-project
          xcodebuild -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath ../MyGame.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO
  
      - name: Export Unsigned IPA
        run: |
          mkdir -p out
          xcodebuild -exportArchive \
            -archivePath MyGame.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath out \
            CODE_SIGNING_ALLOWED=NO
  
      - uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: out/*.ipa
